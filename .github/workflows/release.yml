name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DREACH_BUILD_TESTS=OFF
          -DREACH_RUN_ARCHITECTURE_CHECK=OFF

      - name: Build release zip
        run: cmake --build build --config Release --target reach_release_zip --parallel

      - name: Verify release artifact
        shell: pwsh
        run: |
          Get-ChildItem -Recurse build/dist
          if (-not (Get-ChildItem build/dist/*.zip)) {
            throw "No release ZIP produced"
          }

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/dist/*.zip
